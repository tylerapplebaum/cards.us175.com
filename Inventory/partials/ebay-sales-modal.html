<!-- partials/ebay-sales-modal.html -->
<div class="modal fade" id="eBaySalesModal" tabindex="-1" role="dialog" aria-labelledby="eBaySalesModalLabel" aria-modal="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="eBaySalesModalLabel">List Item on eBay</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="modal-body">
        <form id="eBaySalesForm">
          <div class="form-row">
            <div class="form-group col-12">
              <label for="eBaySalesGuid">GUID</label>
              <input type="text" class="form-control" id="eBaySalesGuid" readonly>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group col-sm-6">
              <label for="eBaySalesListingType">Listing Type</label>
              <select class="custom-select form-control" id="eBaySalesListingType" required>
                <option value="BUY_IT_NOW">BUY_IT_NOW</option>
                <option value="AUCTION">AUCTION</option>
              </select>
            </div>
            <div class="form-group col-sm-6">
              <label for="eBaySalesStartingBid">Starting Bid</label>
              <input type="number" class="form-control" id="eBaySalesStartingBid" min="0" step="0.01" placeholder="Only for auctions" disabled>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group col-sm-6">
              <label for="eBaySalesAllowOffers">Allow Offers</label>
              <select class="custom-select form-control" id="eBaySalesAllowOffers" required>
                <option value="false">false</option>
                <option value="true">true</option>
              </select>
            </div>
            <div class="form-group col-sm-6">
              <label for="eBaySalesAutographed">Autographed</label>
              <select class="custom-select form-control" id="eBaySalesAutographed" required>
                <option value="No">No</option>
                <option value="Yes">Yes</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group col-12">
              <label for="eBaySalesTeam">Team</label>
              <input type="text" class="form-control" id="eBaySalesTeam" list="eBaySalesTeamList" placeholder="Team name" required>
              <datalist id="eBaySalesTeamList">
                <option value="Arizona Diamondbacks">
                <option value="Atlanta Braves">
                <option value="Baltimore Orioles">
                <option value="Boston Red Sox">
                <option value="Brooklyn Dodgers">
                <option value="California Angels">
                <option value="Chicago Cubs">
                <option value="Chicago White Sox">
                <option value="Cincinnati Reds">
                <option value="Cleveland Guardians">
                <option value="Cleveland Indians">
                <option value="Colorado Rockies">
                <option value="Detroit Tigers">
                <option value="Florida Marlins">
                <option value="Houston Astros">
                <option value="Kansas City Athletics">
                <option value="Kansas City Royals">
                <option value="Los Angeles Angels">
                <option value="Los Angeles Dodgers">
                <option value="Miami Marlins">
                <option value="Milwaukee Braves">
                <option value="Milwaukee Brewers">
                <option value="Minnesota Twins">
                <option value="Montreal Expos">
                <option value="New York Giants">
                <option value="New York Mets">
                <option value="New York Yankees">
                <option value="Oakland Athletics">
                <option value="Philadelphia Phillies">
                <option value="Pittsburgh Pirates">
                <option value="San Diego Padres">
                <option value="San Francisco Giants">
                <option value="Seattle Mariners">
                <option value="St. Louis Cardinals">
                <option value="Tampa Bay Rays">
                <option value="Texas Rangers">
                <option value="Toronto Blue Jays">
                <option value="Washington Nationals">
              </datalist>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group col-12 mb-1">
              <div class="d-flex justify-content-between align-items-center">
                <label for="eBaySalesTitle" class="mb-1">Title</label>
                <small class="text-muted" id="eBaySalesTitleCounter">0/80</small>
              </div>
              <input
                type="text"
                class="form-control"
                id="eBaySalesTitle"
                maxlength="80"
                placeholder="Proposed eBay title"
                required
              >
            </div>
          </div>

          <div class="form-row">
            <div class="form-group col-12 mb-1">
              <label for="eBaySalesResponse">API Response</label>
              <textarea class="form-control" id="eBaySalesResponse" rows="8" readonly placeholder="Response will appear here after submission."></textarea>
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <div class="small text-muted mr-auto" id="eBaySalesStatus"></div>
        <button type="button" class="btn btn-primary" id="eBaySalesSubmitBtn">Submit</button>
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
